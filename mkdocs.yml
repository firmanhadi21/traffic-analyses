site_name: Traffic Congestion Pipeline
site_url: https://firmanhadi21.github.io/traffic-analyses/
site_description: >-
  Open-source Python pipeline for spatiotemporal traffic congestion analysis
  using HERE API, OSMnx, and PySAL.
site_author: Firman Hadi

repo_name: firmanhadi21/traffic-analyses
repo_url: https://github.com/firmanhadi21/traffic-analyses

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: numpy
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Reproducing the Analysis: getting-started/reproducing.md
  - CLI Reference: cli.md
  - API Reference:
      - Overview: api/index.md
      - config: api/config.md
      - utils: api/utils.md
      - aggregate: api/aggregate.md
      - eda: api/eda.md
      - geostatistics: api/geostatistics.md
      - bottleneck: api/bottleneck.md
      - poi: api/poi.md
      - synthesis: api/synthesis.md
  - Data Format: data-format.md
  - Adding a City: adding-a-city.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/firmanhadi21
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/traffic-congestion-pipeline/
